site_name: JSONL Algebra
site_description: A powerful relational algebra CLI and library for JSONL data manipulation
site_author: Alex Towell
site_url: https://queelius.github.io/jsonl-algebra
repo_url: https://github.com/queelius/jsonl-algebra
repo_name: queelius/jsonl-algebra
edit_uri: edit/main/docs/

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.tracking
    - navigation.indexes
    - search.highlight
    - search.share
    - search.suggest
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
  palette:
    - scheme: default
      primary: blue
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: blue
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  icon:
    repo: fontawesome/brands/github
  font:
    text: Roboto
    code: Roboto Mono

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: ["ja"]
          options:
            show_source: true
            show_root_heading: true
            show_category_heading: true
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            members_order: source

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.tasklist:
      custom_checkbox: true
  - tables
  - attr_list
  - md_in_html
  - def_list
  - footnotes
  - toc:
      permalink: true
      toc_depth: 3

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/queelius/jsonl-algebra
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/jsonl-algebra/
  version:
    provider: mike

extra_css:
  - stylesheets/extra.css

nav:
  - Home: index.md

  - Getting Started:
    - Installation: getting-started/installation.md
    - Quick Start: getting-started/quickstart.md
    - Core Concepts: getting-started/concepts.md

  - CLI Reference:
    - Overview: cli/overview.md

  - ja-shell:
    - Introduction: shell/introduction.md

  - Integrations:
    - Overview: integrations/overview.md

  - Tutorials:
    - Analyzing Log Files: tutorials/data-analysis.md

  - Interactive REPL:
    - Introduction: guide/repl/introduction.md
    - Dataset Management: guide/repl/datasets.md
    - Operations: guide/repl/operations.md

  - Contributing: contributing.md

  - Reference:
    - API Reference: reference.md
    - FAQ: faq.md
    - Future Plans: future-plans.md
    - Changelog: changelog.md
